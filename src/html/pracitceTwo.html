<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>train</title>
    <link rel="stylesheet" href="/src/css/style.css" />
  </head>
  <body>
    <div
      id="progress-bar"
      style="
        width: 0%;
        height: 5px;
        background: green;
        position: fixed;
        top: 0;
        left: 0;
      "
    ></div>

    <div style="padding-top: 50px">
      <p>Скрольте сторінку вниз, щоб побачити роботу індикатора...</p>
    </div>
    <ul id="products-list"></ul>
    <textarea id="note-pad" placeholder="Пишіть свої нотатки тут..."></textarea>
    <div class="tabs-controls">
      <button data-target="tab-1">Про нас</button>
      <button data-target="tab-2">Контакти</button>
    </div>

    <div id="tab-1" class="tab-content">Ми — крута компанія.</div>
    <div id="tab-2" class="tab-content" style="display: none">
      Наш email: test@test.com
    </div>
    <form id="register-form">
      <input type="password" id="pass" placeholder="Пароль" />
      <input
        type="password"
        id="confirm-pass"
        placeholder="Підтвердіть пароль"
      />
      <button type="submit">Зареєструватися</button>
    </form>
    <p id="auth-error" style="color: red"></p>
    <div>
      <span id="timer-display">0</span> секунд
      <button id="start-timer">Старт</button>
      <button id="stop-timer">Стоп</button>
    </div>
    <div class="gallery">
      <img id="main-img" src="https://picsum.photos/id/10/300/200" alt="Main" />
      <div class="thumbnails">
        <button
          class="thumb-btn"
          data-src="https://picsum.photos/id/20/300/200"
        >
          Фото 1
        </button>
        <button
          class="thumb-btn"
          data-src="https://picsum.photos/id/30/300/200"
        >
          Фото 2
        </button>
      </div>
    </div>
    <button id="load-todo">Завантажити завдання</button>
    <p id="todo-title">Тут буде заголовок...</p>
    <div class="filters">
      <button data-filter="all">Усі</button>
      <button data-filter="tech">Гаджети</button>
      <button data-filter="clothing">Одяг</button>
    </div>

    <div class="items">
      <div class="item-card" data-category="tech">Телефон</div>
      <div class="item-card" data-category="clothing">Футболка</div>
      <div class="item-card" data-category="tech">Ноутбук</div>
    </div>
    <ul id="task-list">
      <li style="display: block">
        Купити молоко <button class="delete-btn">Видалити</button>
      </li>
      <li style="display: block">
        Помити машину <button class="delete-btn">Видалити</button>
      </li>
      <li style="display: block">
        Вчити JS <button class="delete-btn">Видалити</button>
      </li>
    </ul>

    <script type="module" src="/src/js/practiceTwo.js"></script>
  </body>
</html>
