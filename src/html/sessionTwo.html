<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>train</title>
    <link rel="stylesheet" href="/src/css/style.css" />
  </head>
  <body>
    <a href="/index.html">Go to main</a>
    <div class="counter">
      <button id="decrement">-</button>
      <span id="value">0</span>
      <button id="increment">+</button>
    </div>
    <button id="theme-toggle">Змінити тему</button>
    <form id="login-form">
      <input type="text" id="email-input" placeholder="Введіть email" />
      <button type="submit">Увійти</button>
    </form>
    <p id="error" style="color: red"></p>
    <button id="open-btn">Відкрити вікно</button>

    <div
      id="modal"
      class="modal hidden"
      style="border: 1px solid #000; padding: 20px; width: 200px"
    >
      <p>Це модальне вікно!</p>
      <button id="close-btn">Закрити</button>
    </div>
    <input type="text" id="todo-input" placeholder="Нове завдання" />
    <button id="add-todo">Додати</button>

    <ul id="todo-list"></ul>
    <textarea id="message" placeholder="Введіть текст..."></textarea>
    <p>Символів: <span id="char-count">0</span></p>
    <input type="text" id="search" placeholder="Пошук фруктів..." />
    <ul id="fruits">
      <li>Яблуко</li>
      <li>Банан</li>
      <li>Апельсин</li>
      <li>Ананас</li>
    </ul>
    <script type="module" src="/src/js/sessionTwo.js"></script>
  </body>
</html>
